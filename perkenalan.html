<!DOCTYPE html>
<html lang="id">
<head>

    <title>Perkenalan Diri saya</title>

        }

            color: #ffd700;
            font-weight: bold;
        }

</head>
<body>

    <div class="card">
        <h1>Memperkenal kan diri saya</h1>

        <p>Saya adalah siswa kelas <span class="highlight">7.9</span>.</p>

</html>
